<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akh Jana</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: #d8d5cd;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Jost', sans-serif;
    padding: 24px;
  }

  .card {
    width: 100%;
    max-width: 420px;
    background: #f4f2ec;
    box-shadow: 0 20px 50px rgba(0,0,0,0.25);
  }

  .cover {
    width: 100%;
    height: auto;
    display: block;
    border-bottom: 2px solid #1a1a1a;
  }

  .body { padding: 26px 26px 22px; }

  .top-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 22px;
  }

  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 44px;
    font-weight: 600;
    letter-spacing: 1px;
    color: #1a1a1a;
  }

  .month {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 22px;
    text-align: right;
    color: #1a1a1a;
  }

  .artist {
    font-size: 13px;
    color: #444;
    margin-bottom: 8px;
    letter-spacing: 0.3px;
  }

  .progress-wrap { margin-bottom: 18px; }

  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 2px;
    background: #1a1a1a;
    outline: none;
    margin-bottom: 6px;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #1a1a1a;
    cursor: pointer;
  }

  .times {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: #1a1a1a;
    font-variant-numeric: tabular-nums;
  }

  .controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 22px 0 18px;
  }

  .controls button {
    background: none;
    border: none;
    cursor: pointer;
    color: #1a1a1a;
    padding: 6px;
  }
  .controls svg { width: 22px; height: 22px; }
  .play-btn svg { width: 34px; height: 34px; }

  .waveform {
    display: flex;
    align-items: center;
    gap: 2px;
    height: 40px;
    overflow: hidden;
  }
  .waveform span {
    flex: 1;
    background: #1a1a1a;
    min-width: 2px;
    border-radius: 1px;
    opacity: 0.55;
  }
  .waveform span.played { opacity: 1; }
</style>
</head>
<body>

<div class="card">
  <img class="cover" src="IMG_20260721_200029_031.jpg" alt="cover">

  <div class="body">
    <div class="top-row">
      <div class="logo">REYHOON</div>
      <div class="month">July<br><span style="font-size:15px; font-style:normal;">2009</span></div>
    </div>

    <div class="artist">Mohammadreza Eshaghi</div>

    <div class="progress-wrap">
      <input type="range" id="seek" value="0" min="0" max="100" step="0.1">
      <div class="times">
        <span id="current-time">0:00</span>
        <span id="duration">0:00</span>
      </div>
    </div>

    <div class="controls">
      <button id="loopBtn" title="تکرار">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
      </button>
      <button id="backBtn" title="۱۰ ثانیه عقب">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M11 6V2L6 7l5 5V8c3.3 0 6 2.7 6 6s-2.7 6-6 6-6-2.7-6-6H3c0 4.4 3.6 8 8 8s8-3.6 8-8-3.6-8-8-8z"/></svg>
      </button>
      <button class="play-btn" id="playBtn" title="پخش/توقف">
        <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button id="fwdBtn" title="۱۰ ثانیه جلو">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 6V2l5 5-5 5V8c-3.3 0-6 2.7-6 6s2.7 6 6 6 6-2.7 6-6h2c0 4.4-3.6 8-8 8s-8-3.6-8-8 3.6-8 8-8z"/></svg>
      </button>
      <button id="shuffleBtn" title="شافل">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17 3h4v4M14 7l7-4M3 7l6 6M3 17h4l10-10M17 21h4v-4M21 21l-6-6"/></svg>
      </button>
    </div>

    <div class="waveform" id="waveform"></div>
  </div>
</div>

<audio id="audio" src="Mohammadreza Eshaghi-Akh Jana -musicdel.ir 128.mp3" preload="metadata"></audio>

<script>
  const audio = document.getElementById('audio');
  const playBtn = document.getElementById('playBtn');
  const playIcon = document.getElementById('playIcon');
  const seek = document.getElementById('seek');
  const currentTimeEl = document.getElementById('current-time');
  const durationEl = document.getElementById('duration');
  const waveform = document.getElementById('waveform');
  const loopBtn = document.getElementById('loopBtn');

  const ICON_PLAY = 'M8 5v14l11-7z';
  const ICON_PAUSE = 'M6 5h4v14H6zM14 5h4v14h-4z';

  // ساخت نوار موج (تزئینی)
  const barCount = 60;
  for (let i = 0; i < barCount; i++) {
    const bar = document.createElement('span');
    const h = 8 + Math.random() * 32;
    bar.style.height = h + 'px';
    waveform.appendChild(bar);
  }
  const bars = waveform.querySelectorAll('span');

  function formatTime(sec) {
    if (isNaN(sec)) return '0:00';
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60).toString().padStart(2, '0');
    return `${m}:${s}`;
  }

  audio.addEventListener('loadedmetadata', () => {
    seek.max = audio.duration;
    durationEl.textContent = formatTime(audio.duration);
  });

  audio.addEventListener('timeupdate', () => {
    seek.value = audio.currentTime;
    currentTimeEl.textContent = formatTime(audio.currentTime);
    const progress = audio.currentTime / audio.duration;
    bars.forEach((bar, i) => {
      bar.classList.toggle('played', i / barCount < progress);
    });
  });

  seek.addEventListener('input', () => {
    audio.currentTime = seek.value;
  });

  function togglePlay() {
    if (audio.paused) {
      audio.play();
      playIcon.setAttribute('d', ICON_PAUSE);
    } else {
      audio.pause();
      playIcon.setAttribute('d', ICON_PLAY);
    }
  }
  playBtn.addEventListener('click', togglePlay);
  audio.addEventListener('ended', () => playIcon.setAttribute('d', ICON_PLAY));

  document.getElementById('backBtn').addEventListener('click', () => {
    audio.currentTime = Math.max(0, audio.currentTime - 10);
  });
  document.getElementById('fwdBtn').addEventListener('click', () => {
    audio.currentTime = Math.min(audio.duration, audio.currentTime + 10);
  });

  let looping = false;
  loopBtn.addEventListener('click', () => {
    looping = !looping;
    audio.loop = looping;
    loopBtn.style.opacity = looping ? '1' : '0.5';
  });

  // برای نمایش در نوار اعلان و صفحه قفل گوشی
  if ('mediaSession' in navigator) {
    navigator.mediaSession.metadata = new MediaMetadata({
      title: 'Akh Jana',
      artist: 'Mohammadreza Eshaghi',
      artwork: [{ src: 'IMG_20260721_200029_031.jpg', sizes: '512x512', type: 'image/jpeg' }]
    });
    navigator.mediaSession.setActionHandler('play', togglePlay);
    navigator.mediaSession.setActionHandler('pause', togglePlay);
    navigator.mediaSession.setActionHandler('seekbackward', () => audio.currentTime -= 10);
    navigator.mediaSession.setActionHandler('seekforward', () => audio.currentTime += 10);
  }
</script>

</body>
</html>
