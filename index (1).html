<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cover Art</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        #bgImage {
            max-width: 90%;
            max-height: 90%;
            width: auto;
            height: auto;
            display: block;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <img id="bgImage" src="IMG_20260721_200029_031.jpg" alt="Cover Art">
    </div>
    
    <audio id="music" src="Mohammadreza%20Eshaghi-Akh%20Jana%20-musicdel.ir%20128.mp3" preload="auto"></audio>

    <script>
        const img = document.getElementById('bgImage');
        const audio = document.getElementById('music');

        img.addEventListener('click', () => {
            if (audio.paused) {
                audio.play().catch(error => {
                    console.log("Error playing audio: ", error);
                });
            } else {
                audio.pause();
            }
        });
    </script>

</body>
</html>
